experimental = ["setup-scripts"]

[scripts.setup.setup-frontend-uitest]
command = "cargo run -p fir-frontend-uitest --bin setup_harness"

[[profile.default.scripts]]
filter = "deps(fir-frontend-uitest)"
setup = "setup-frontend-uitest"

[profile.frontend-uitest]
default-filter = "deps(fir-frontend-uitest)"
fail-fast = false
